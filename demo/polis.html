<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>

<title>POLIS — Participatory Governance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f0;font-family:'Outfit',sans-serif;color:#1a1a1a;height:100vh;overflow:hidden}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:#1a1a1a;display:flex;flex-direction:column;overflow:hidden}
.brand{display:flex;align-items:center;gap:12px;padding:24px 20px 20px;border-bottom:1px solid #2e2e2e}

.nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{width:100%;display:flex;align-items:center;gap:10px;padding:10px 20px;background:none;border:none;cursor:pointer;color:#888;font-size:13px;font-family:'Outfit',sans-serif;text-align:left;transition:all .15s;position:relative}
.nav-item:hover{color:#ccc;background:#232323}
.nav-item.active{color:#e8e4d9;background:#252525}

.nav-icon{font-size:14px;width:16px;text-align:center}
.badge{margin-left:auto;background:#3b82f6;color:white;font-size:10px;padding:1px 6px;border-radius:99px}

.me-card{display:flex;align-items:center;gap:10px;padding:14px 16px;border-top:1px solid #2e2e2e;background:#161616}
.me-name{font-size:13px;color:#ccc;font-weight:500}
.me-role{font-size:10px;color:#555;margin-top:1px}

.avatar{border-radius:50%;background:#e8e4d9;color:#1a1a1a;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-weight:500;flex-shrink:0}

.topbar-right{display:flex;align-items:center;gap:12px}
.cycle-pill{font-size:11px;color:#888;border:1px solid #ddd;padding:5px 12px;border-radius:99px;font-family:'DM Mono',monospace;letter-spacing:.05em}
.propose-btn{background:#1a1a1a;color:#e8e4d9;border:none;padding:8px 18px;border-radius:6px;font-size:13px;font-family:'Outfit',sans-serif;cursor:pointer;transition:opacity .15s}

.content{flex:1;overflow-y:auto;padding:28px 32px}

.toast.hidden{display:none}

.proposal-meta{display:flex;align-items:center;gap:8px;flex:1;min-width:0}

.vote-mini{display:flex;align-items:center;gap:8px;flex-shrink:0}
.vote-bar-wrap{width:60px;height:4px;background:#f0ede6;border-radius:2px}

.vote-pct{font-size:11px;color:#888;font-family:'DM Mono',monospace;width:32px}

.sar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}

.checkmark{font-size:11px;color:#22c55e;font-weight:700}
.next-marker{font-size:9px;color:#22c55e;letter-spacing:.1em;font-weight:600}
.cycle-stat{padding:16px 20px;border-right:1px solid #f0ede6}
.cycle-stat:last-child{border-right:none}
.cs-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.cs-val{font-family:'DM Serif Display',serif;font-size:24px;color:#1a1a1a}
.cs-val.green{color:#16a34a}
.big-progress-wrap{padding:0 20px 20px}
.big-progress-bar{height:6px;background:#f0ede6;border-radius:3px}
.big-progress-fill{height:100%;background:#1a1a1a;border-radius:3px}
.big-progress-label{font-size:11px;color:#888;margin-top:8px;font-family:'DM Mono',monospace}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{padding:10px 16px;text-align:left;font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #f0ede6}
.data-table tbody tr{border-bottom:1px solid #faf9f6;transition:background .1s}
.data-table tbody tr:hover{background:#faf9f6}
.data-table td{padding:12px 16px;color:#333;vertical-align:middle}
.tc{text-align:center}
.mono{font-family:'DM Mono',monospace;font-size:11px;color:#888}
.member-cell{display:flex;align-items:center;gap:10px}
.member-name{font-size:13px;font-weight:500}
.member-id-sm{font-size:10px;color:#aaa;font-family:'DM Mono',monospace}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}
.tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.05em}
.tag.received{background:#f0fdf4;color:#16a34a}
.tag.next-pay{background:#1a1a1a;color:#e8e4d9}
.tag.pending{background:#f5f4f0;color:#aaa}

.tx-type.payout{background:#f0fdf4;color:#16a34a}
.tx-type.penalty{background:#fff7ed;color:#c2410c}
.tx-type.reserve{background:#eff6ff;color:#1d4ed8}
.amt{font-family:'DM Mono',monospace;font-weight:500}
.amt.pos{color:#16a34a}
.amt.neg{color:#dc2626}
.note-cell{font-size:12px;color:#888}
.proposals-list{display:flex;flex-direction:column;gap:20px}
.proposal-card{background:white;border:1px solid #e5e3db;border-radius:10px;padding:24px;display:flex;flex-direction:column;gap:16px}
.pc-title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.pc-title{font-family:'DM Serif Display',serif;font-size:18px;color:#1a1a1a;flex:1}
.p-status{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.pc-meta{font-size:12px;color:#aaa}
.pc-body{font-size:14px;color:#555;line-height:1.6}
.ai-box{background:#faf9f6;border:1px solid #e5e3db;border-radius:8px;padding:16px}
.ai-label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;flex-wrap:wrap}
.risk-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.ai-sum{font-size:13px;color:#444;line-height:1.6;margin-bottom:8px}
.ai-rec{font-size:12px;color:#666;line-height:1.5}
.ai-rec strong{color:#1a1a1a}
.vote-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.vote-counts{display:flex;gap:16px}
.vc-for{font-size:13px;color:#16a34a;font-weight:600}
.vc-against{font-size:13px;color:#dc2626;font-weight:600}
.vc-abs{font-size:13px;color:#888;font-weight:600}
.vote-btns{display:flex;gap:8px}
.vbtn{padding:7px 16px;border-radius:6px;border:1px solid;font-size:12px;font-family:'Outfit',sans-serif;cursor:pointer;font-weight:500;transition:all .15s}
.vbtn.for{border-color:#16a34a;color:#16a34a;background:white}
.vbtn.for:hover{background:#16a34a;color:white}
.vbtn.against{border-color:#dc2626;color:#dc2626;background:white}
.vbtn.against:hover{background:#dc2626;color:white}
.vbtn.abs{border-color:#ddd;color:#888;background:white}
.vbtn.abs:hover{background:#f5f4f0}
.const-header{margin-bottom:28px}
.const-title{font-family:'DM Serif Display',serif;font-size:32px;color:#1a1a1a;margin-bottom:6px}
.const-meta{font-size:12px;color:#aaa;font-family:'DM Mono',monospace}
.article-card{display:flex;gap:20px;background:white;border:1px solid #e5e3db;border-radius:10px;padding:20px;margin-bottom:12px}
.art-id{font-family:'DM Serif Display',serif;font-size:20px;color:#ddd;min-width:40px;flex-shrink:0;padding-top:2px}
.art-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:8px}
.art-body{font-size:14px;color:#555;line-height:1.7}
.law-row{display:flex;align-items:flex-start;gap:16px;padding:14px 20px;border-bottom:1px solid #f5f4f0}
.law-id{font-family:'DM Mono',monospace;font-size:11px;color:#aaa;min-width:48px;padding-top:2px}
.law-content{flex:1}
.law-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:3px}
.law-body{font-size:12px;color:#666}
.law-status{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;flex-shrink:0}
.member-card{background:white;border:1px solid #e5e3db;border-radius:10px;padding:20px}
.mc-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.mc-name{font-size:15px;font-weight:600;color:#1a1a1a}
.mc-id{font-size:11px;color:#aaa;font-family:'DM Mono',monospace;margin-top:1px}
.mc-status{font-size:11px;color:#888;margin-top:4px;display:flex;align-items:center}
.mc-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mcs{background:#faf9f6;border-radius:6px;padding:10px 12px}
.mcs-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.mcs-val{font-size:14px;font-weight:600;color:#1a1a1a}
.sar-explainer{background:#1a1a1a;color:#888;border-radius:8px;padding:14px 20px;font-size:13px;line-height:1.6;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.sar-e-label{font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:#22c55e;border:1px solid #22c55e40;padding:3px 8px;border-radius:4px;flex-shrink:0}
.sar-card{background:white;border:1px solid #e5e3db;border-radius:10px;padding:20px;margin-bottom:12px}
.sar-card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sar-id{font-family:'DM Mono',monospace;font-size:11px;color:#aaa}
.sar-ts{font-family:'DM Mono',monospace;font-size:11px;color:#bbb;flex:1}
.sar-sbadge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.sar-phases{display:flex;flex-direction:column;gap:10px}
.sar-phase{display:flex;gap:14px}
.spl{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;border-radius:4px;min-width:68px;text-align:center;flex-shrink:0;margin-top:1px;height:fit-content}
.spl.sense{background:#eff6ff;color:#1d4ed8}
.spl.analyze{background:#fefce8;color:#854d0e}
.spl.respond{background:#f0fdf4;color:#166534}
.sp-body{font-size:13px;color:#444;line-height:1.6}
.modal-backdrop{position:fixed;inset:0;background:#1a1a1a80;display:flex;align-items:center;justify-content:center;z-index:50}
.modal-backdrop.hidden{display:none}
.modal{background:white;border-radius:12px;width:560px;max-width:95vw;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.2)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #f0ede6}
.modal-hdr h2{font-family:'DM Serif Display',serif;font-size:20px;color:#1a1a1a}
.modal-close{background:none;border:none;cursor:pointer;font-size:16px;color:#888;padding:4px}
.modal-close:hover{color:#1a1a1a}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:16px}
.modal-body label{display:flex;flex-direction:column;gap:6px;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em}
.modal-body input,.modal-body select,.modal-body textarea{border:1px solid #e5e3db;border-radius:6px;padding:10px 12px;font-size:14px;font-family:'Outfit',sans-serif;color:#1a1a1a;background:white;outline:none;transition:border-color .15s;resize:vertical}
.modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{border-color:#1a1a1a}
.modal-note{font-size:12px;color:#aaa;line-height:1.6;background:#faf9f6;padding:12px;border-radius:6px}
.modal-ftr{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid #f0ede6}
.btn-sec{background:white;border:1px solid #e5e3db;color:#888;padding:9px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-sec:hover{background:#faf9f6}
.btn-pri{background:#1a1a1a;color:#e8e4d9;border:none;padding:9px 20px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .15s}
.btn-pri:hover{opacity:.85}
.view{display:none}
.view.active{display:block}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">Π</div>
      <div><div class="brand-name">POLIS</div><div class="brand-sub">Governance Engine</div></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="me-card" id="me-card"></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="page-title" id="page-title">Overview</div>
      <div class="topbar-right">
        <div class="cycle-pill" id="cycle-pill"></div>
        <button class="propose-btn" onclick="openModal()">+ Propose</button>
      </div>
    </header>
    <div class="toast hidden" id="toast"></div>
    <div class="content" id="content">
      <div class="view active" id="view-dashboard"></div>
      <div class="view" id="view-cycle"></div>
      <div class="view" id="view-proposals"></div>
      <div class="view" id="view-constitution"></div>
      <div class="view" id="view-treasury"></div>
      <div class="view" id="view-members"></div>
      <div class="view" id="view-sar"></div>
    </div>
  </main>
</div>
<div class="modal-backdrop hidden" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <h2>New Proposal</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label>Proposal Type<select id="new-type"><option value="law">Operating Law (simple majority)</option><option value="constitutional">Constitutional Amendment (supermajority)</option></select></label>
      <label>Title<input type="text" id="new-title" placeholder="Brief, clear title..."/></label>
      <label>Full Proposal Text<textarea id="new-body" rows="6" placeholder="Describe the proposed change, rationale, and expected impact..."></textarea></label>
      <div class="modal-note">The AI Governance Engine will analyze this proposal against the Constitution and Operating Laws before the vote opens.</div>
    </div>
    <div class="modal-ftr">
      <button class="btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn-pri" onclick="submitProposal()">Submit Proposal</button>
    </div>
  </div>
</div>
<script>
const CONSTITUTION={name:"The Susu Circle Constitution",version:"1.0.2",adoptedDate:"2024-01-15",articles:[{id:"A1",title:"Purpose & Values",body:"This cooperative exists to enable members to save together and support one another through structured rotating payouts. We operate on the principles of mutual trust, radical transparency, and democratic self-governance."},{id:"A2",title:"Membership",body:"Any person of legal age may apply for membership. Admission requires a two-thirds approval vote of existing members. Members in good standing have one vote each on all standard proposals."},{id:"A3",title:"Contributions",body:"Each member contributes a fixed amount per cycle as defined in the Operating Laws. Contributions are due within the first 5 days of each cycle. Late contributions incur a penalty as defined in the Operating Laws."},{id:"A4",title:"Payout Rotation",body:"Each cycle, one member receives the full pool. Rotation order is determined by lottery at the start of each full round. A member may trade their position with mutual written consent. Hardship priority claims require a member vote."},{id:"A5",title:"Governance",body:"All legislative power resides in the membership. The AI Governance Engine serves as a neutral executor of this Constitution and the Operating Laws. It may not override member votes. It must surface all conflicts and ambiguities for member resolution."},{id:"A6",title:"Amendment",body:"This Constitution may be amended by a two-thirds supermajority of all active members. Proposals must be open for no less than 7 days before a vote is called."},{id:"A7",title:"Dissolution",body:"The cooperative may be dissolved by unanimous consent, or by a three-quarters vote if quorum fails for three consecutive cycles. All remaining funds shall be distributed proportionally to members in good standing."}]};
const LAWS=[{id:"L001",title:"Cycle Duration",body:"Each cycle is 30 days.",status:"active"},{id:"L002",title:"Contribution Amount",body:"Each member contributes $200 per cycle.",status:"active"},{id:"L003",title:"Late Payment Penalty",body:"Late payments incur a 5% penalty added to the next contribution.",status:"active"},{id:"L004",title:"Quorum",body:"A quorum of 60% of active members is required for standard votes. Constitutional amendments require 80%.",status:"active"},{id:"L005",title:"Voting Period",body:"Standard proposals are open for voting for 5 days. Constitutional amendments are open for 14 days.",status:"active"},{id:"L006",title:"Member Limit",body:"The cooperative may not exceed 100 active members without a constitutional amendment.",status:"active"},{id:"L007",title:"Early Exit",body:"A member wishing to exit early must find a replacement approved by the membership, or forfeit contributions to date with no payout.",status:"active"},{id:"L008",title:"Emergency Reserve",body:"5% of each cycle payout is retained in a reserve fund for defaults, administrative costs, and cooperative needs.",status:"active"}];

let toastTimer;

function setView(v){
  activeView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.view===v));
  document.getElementById('page-title').textContent=NAV.find(n=>n.id===v)?.label||'';
  document.getElementById('content').scrollTop=0;
}

function buildNav(){
  const ap=proposals.filter(p=>p.status==='voting'||p.status==='open');
  const lm=MEMBERS.filter(m=>m.status==='late');
  document.getElementById('nav').innerHTML=NAV.map(n=>{
    let b='';
    if(n.id==='proposals'&&ap.length>0)b=`<span class="badge">${ap.length}</span>`;
    if(n.id==='members'&&lm.length>0)b=`<span class="badge warn">${lm.length}</span>`;
    return`<button class="nav-item${n.id===activeView?' active':''}" data-view="${n.id}" onclick="setView('${n.id}')">\
<span class="nav-icon">${n.icon}</span><span>${n.label}</span>${b}</button>`;
  }).join('');
  document.getElementById('cycle-pill').textContent=`Cycle ${TREASURY.currentCycle} of ${TREASURY.totalCycles}`;
  const me=gm(ACTIVE_MEMBER);
  document.getElementById('me-card').innerHTML=`<div class="avatar sm">${me.avatar}</div><div><div class="me-name">${me.name.split(' ')[0]}</div><div class="me-role">Member · ${me.id}</div></div><div class="next-tag">NEXT</div>`;
}

function castVote(pid,vote){
  const p=proposals.find(x=>x.id===pid);if(!p)return;
  if(vote==='for')p.votesFor++;else if(vote==='against')p.votesAgainst++;else p.abstain++;
  const total=vt(p),active=MEMBERS.filter(m=>m.status==='active').length;
  sarLog.unshift({id:`SAR${Date.now()}`,timestamp:new Date().toISOString(),sense:`Vote cast on proposal ${pid} by member ${ACTIVE_MEMBER}`,analyze:`Verified member voting eligibility. ${total} / ${active} members voted.`,respond:`Vote recorded. ${Math.round((total/active)*100)}% quorum reached.`,status:'completed'});
  buildProposals();buildSAR();buildDashboard();buildNav();
  toast(`Vote recorded on "${p.title}"','success`);
}

function openModal(){document.getElementById('modal-backdrop').classList.remove('hidden');document.getElementById('new-title').value='';document.getElementById('new-body').value='';document.getElementById('new-type').value='law';}
function closeModal(){document.getElementById('modal-backdrop').classList.add('hidden');}
function handleBackdropClick(e){if(e.target===document.getElementById('modal-backdrop'))closeModal();}

function submitProposal(){
  const title=document.getElementById('new-title').value.trim();
  const body=document.getElementById('new-body').value.trim();
  const type=document.getElementById('new-type').value;
  if(!title||!body){toast('Please fill in all fields');return;}
  const id=`P${String(proposals.length+1).padStart(3,'0')}`;
  const today=new Date().toISOString().split('T')[0];
  const ends=new Date(Date.now()+5*86400000).toISOString().split('T')[0];
  proposals.unshift({id,type,title,body,proposedBy:ACTIVE_MEMBER,proposedDate:today,status:'open',votesFor:0,votesAgainst:0,abstain:0,votingEnds:ends,aiAnalysis:{riskLevel:'pending',constitutionalConflict:false,summary:'AI analysis in progress. This proposal has been logged and is being reviewed against the Constitution and Operating Laws.',recommendation:'Under review — check back shortly.'}});
  sarLog.unshift({id:`SAR${Date.now()}`,timestamp:new Date().toISOString(),sense:`New ${type} proposal "${title}" submitted by ${ACTIVE_MEMBER}`,analyze:`Proposal intake logged. Checking against Constitution and Operating Laws.`,respond:`Proposal ${id} created. Analysis queued.`,status:'pending'});
  buildProposals();buildSAR();buildNav();
  closeModal();setView('proposals');
  toast(`Proposal submitted — ID ${id}`,'success');
}

// init
buildNav();buildDashboard();buildCycle();buildProposals();buildConstitution();buildTreasury();buildMembers();buildSAR();
</script>
