# POLIS Production Docker Compose
# Usage: docker compose -f deploy/docker-compose.prod.yml up -d

services:
  polis:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${PORT:-3143}:3143"
    environment:
      NODE_ENV: production
      PORT: 3143
      DATABASE_URL: postgresql://polis:${POSTGRES_PASSWORD:-polis_secure_pw}@db:5432/polis
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      HMAC_SECRET: ${HMAC_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - config:/app/polis.config.json
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3143/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polis
      POSTGRES_USER: polis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polis_secure_pw}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # No port exposed — only accessible via internal network

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - polis
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  caddy_data:
  caddy_config:
  config:
